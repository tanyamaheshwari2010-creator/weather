<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="weather.css">
</head>
<body>
    <main>
        <div id="outer">
             <p id="heading">Weather Dashboard</p>
             <div id="two">
                <input type="text" value="" id="input">
                <br>
                <button id="btn">
                    Search
                </button>
             </div>
             <div id="three">
               <div  class="info">
                <h3>City:</h3>
                <p id="city"></p>
            </div>
               <div  class="info">
                <h3>Latitude:</h3>
                <p id="lat"></p>
            </div>
               <div class="info">
               <h3> Longitude:</h3>
               <p id="lon"></p>
            </div>
               <div class="info">
                <h3>Weather:</h3>
                <p id="w"></p>
            </div>
             </div>
        </div>
    </main>
    <script src="weather.js"></script>
</body>
</html>
